name: NBA Playoff Predictor Update

on:
  schedule:
    # Run at 6:30 AM UTC (1:30 AM ET) - after last NBA games typically end
    - cron: '30 6 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-nba
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install nba_api pandas requests beautifulsoup4 lxml numpy

      - name: Clone NBA model repo
        run: |
          git clone https://github.com/${{ github.repository_owner }}/nba.git nba-model
        continue-on-error: true

      - name: Copy model code (fallback if no separate repo)
        if: failure()
        run: |
          mkdir -p nba-model/src
          echo "Model code not available - using cached data"

      - name: Generate static JSON
        run: |
          cd nba-model
          python generate_static.py ../nbaplayoffpredictor/data
        env:
          PYTHONPATH: .

      - name: Commit and push
        run: |
          git config user.name "NBA Predictor Bot"
          git config user.email "nba-bot@users.noreply.github.com"
          git add nbaplayoffpredictor/data/
          git diff --staged --quiet || git commit -m "Update NBA predictions $(date +'%Y-%m-%d')"
          git push
